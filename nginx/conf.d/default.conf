# HTTP: прокси на Node на хосте (порт из backend/.env PORT, по умолчанию 3000).
upstream playerok_backend {
    server host.docker.internal:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SSE-стрим синхронизации продаж: держим соединение долго и без буферизации.
    location = /api/sync-sales-stream {
        proxy_pass http://playerok_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://playerok_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Таймауты выровнены с бэкендом (server.requestTimeout≈45с): перегруженный бэкенд
        # быстро отдаёт 504 вместо «зависания» на 5 минут. SSE — в отдельном location выше.
        # Раньше тут стоял proxy_read_timeout 300s — он и превращал затор в 5-минутный 504.
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 75s;
    }
}

