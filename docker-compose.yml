# app: network_mode host (PLAYEROK_OUTBOUND_IP bind)
# nginx: host network on prod; bridge + host.docker.internal for local dev

services:
  app:
    image: ${APP_IMAGE:-levkaster/saitplayerok}
    # Local build: comment image, uncomment build:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    network_mode: host
    env_file:
      - ./backend/.env
    environment:
      DEPLOY_SCRIPT_PATH: /opt/sait/deploy.sh
    volumes:
      - ./backend/data:/app/backend/data
      - /opt/sait:/opt/sait
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  nginx:
    network_mode: host
    build:
      context: .
      dockerfile: nginx/Dockerfile
    depends_on:
      - app
    env_file:
      - ./.env
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    restart: unless-stopped

volumes:
  certbot-conf:
  certbot-www:
